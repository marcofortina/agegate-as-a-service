apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: agegate
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: {{ .Values.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: agegate
spec:
  selector:
    app: redis
  ports:
  - port: {{ .Values.port }}
