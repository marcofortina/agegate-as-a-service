replicaCount: 3

image:
  repository: agegate-verifier
  pullPolicy: Never
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: agegate.local

resources:
  limits:
    cpu: 800m
    memory: 768Mi
  requests:
    cpu: 300m
    memory: 384Mi

persistence:
  enabled: true
  storageClass: "local-path"
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /data

# Environment variables
env:
  LOG_LEVEL: info
  PUBLIC_URL: "http://agegate.local"
