apiVersion: apps/v1
kind: Deployment
metadata:
  name: agegate-verifier
  labels:
    app: agegate-verifier
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: agegate-verifier
  template:
    metadata:
      labels:
        app: agegate-verifier
    spec:
      containers:
      - name: verifier
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        envFrom:
          - secretRef:
              name: agegate-secrets

        env:
          {{- range $key, $value := .Values.env }}
          - name: {{ $key }}
            value: {{ $value | quote }}
          {{- end }}

        ports:
          - containerPort: 8080

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10

        resources:
          {{- toYaml .Values.resources | nindent 10 }}

        volumeMounts:
          - name: data
            mountPath: /data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: agegate-data
