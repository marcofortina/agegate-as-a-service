name: CI - Build & Helm Lint
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Show Node.js version
        run: node -v
      - name: Show npm version
        run: npm -v
      - name: Install dependencies
        run: npm install --prefix verifier-app
      - name: Copy environment file
        run: cp .env.example verifier-app/.env
      - name: Run unit tests with coverage
        run: npm test --prefix verifier-app -- --coverage --coverageReporters=lcov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: verifier-app/coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Install docker-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose
      - name: Run integration tests
        run: |
          cd verifier-app
          docker-compose -f docker-compose.test.yml up -d
          npm run test:integration-compose
      - name: Stop containers
        if: always()
        run: |
          cd verifier-app
          docker-compose -f docker-compose.test.yml down -v
      - uses: azure/setup-helm@v5
      - run: helm lint ./agegate-verifier
