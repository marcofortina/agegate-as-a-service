apiVersion: v1
kind: ServiceAccount
metadata:
  name: agegate-backup-sa
  namespace: agegate
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agegate-backup-role
  namespace: agegate
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["pods/attach"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agegate-backup-rolebinding
  namespace: agegate
subjects:
- kind: ServiceAccount
  name: agegate-backup-sa
  namespace: agegate
roleRef:
  kind: Role
  name: agegate-backup-role
  apiGroup: rbac.authorization.k8s.io
