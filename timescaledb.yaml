apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescaledb
  namespace: agegate
spec:
  serviceName: timescaledb
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
      - name: timescaledb
        image: timescale/timescaledb:latest-pg15

        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agegate-secrets
              key: TIMESCALEDB_PASSWORD

        - name: POSTGRES_DB
          value: "agegate"

        ports:
        - containerPort: 5432

        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: local-path
      resources:
        requests:
          storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: agegate
spec:
  selector:
    app: timescaledb
  ports:
  - port: 5432
    targetPort: 5432
